class_path: asymdsd.components.AdamWSpec
init_args:
  betas:
    - 0.9
    - 0.999
  lr:
    class_path: asymdsd.components.CosineAnnealingWarmupSchedule
    init_args:
      base_value: 2.0e-04
      final_value: 1.0e-07
      warmup_epochs: 10
      startup_value: 1.0e-07
      max_epochs: -1
  weight_decay:
    0.05
